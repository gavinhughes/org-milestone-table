name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - "28.2"
          - "29.4"
          - "30.1"
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Byte-compile
        run: make byte-compile

      - name: Run tests
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: "30.1"

      - name: Install package-lint
        run: |
          emacs -Q --batch \
            --eval '(require (quote package))' \
            --eval '(add-to-list (quote package-archives) (cons "melpa" "https://melpa.org/packages/") t)' \
            --eval '(package-initialize)' \
            --eval '(package-refresh-contents)' \
            --eval '(package-install (quote package-lint))'

      - name: Run package-lint
        run: make lint
